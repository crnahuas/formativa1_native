<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDY2204 EFT</title>
  <style>
    :root {
      --bg: #f4f6fa;
      --panel: #ffffff;
      --line: #d7dee8;
      --text: #162033;
      --muted: #5e687a;
      --primary: #166b7f;
      --primary-dark: #104f60;
      --danger: #9f2d2d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .status {
      min-width: 120px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      text-align: center;
      font-weight: 700;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 16px;
      align-items: start;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      font: inherit;
      background: #fff;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 12px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button.secondary {
      background: #485466;
    }

    pre {
      min-height: 520px;
      margin: 0;
      padding: 14px;
      overflow: auto;
      white-space: pre-wrap;
      border-radius: 8px;
      background: #111827;
      color: #d9f99d;
      font: 13px Menlo, Consolas, monospace;
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 860px) {
      main {
        padding: 16px;
      }

      header,
      .grid {
        display: block;
      }

      .status {
        margin-top: 12px;
        text-align: left;
      }

      section + section {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>CDY2204 EFT</h1>
        <p>Cliente frontend para probar backend, IDaaS, RabbitMQ y S3.</p>
      </div>
      <div id="status" class="status">Sin prueba</div>
    </header>

    <div class="grid">
      <section>
        <h2>Conexion</h2>
        <label for="baseUrl">URL backend</label>
        <input id="baseUrl" autocomplete="off">
        <label for="token">JWT Azure AD B2C</label>
        <textarea id="token" placeholder="Pegar token sin Bearer"></textarea>

        <h2 style="margin-top: 18px;">Datos</h2>
        <label for="cursoNombre">Curso</label>
        <input id="cursoNombre" value="EFT Cloud Native Spring Boot">
        <label for="instructor">Instructor</label>
        <input id="instructor" value="Docente CDY2204">
        <label for="duracion">Duracion</label>
        <input id="duracion" value="24 horas">
        <label for="costo">Costo</label>
        <input id="costo" type="number" value="120000">
        <label for="estudianteNombre">Estudiante</label>
        <input id="estudianteNombre" value="Maria Perez">
        <label for="estudianteEmail">Email</label>
        <input id="estudianteEmail" value="maria.perez@duocuc.cl">
        <label for="cursoId">Curso ID</label>
        <input id="cursoId" type="number" value="1">
        <label for="numeroResumen">Numero resumen</label>
        <input id="numeroResumen" type="number" value="1">
      </section>

      <section>
        <h2>Flujo</h2>
        <div class="actions">
          <button onclick="listarCursos()">Listar cursos</button>
          <button onclick="crearCurso()">Crear curso</button>
          <button onclick="crearInscripcion()">Crear inscripcion</button>
          <button onclick="generarResumen()">Generar resumen</button>
          <button onclick="producirRabbit()">Producir RabbitMQ</button>
          <button onclick="consumirRabbit()">Consumir RabbitMQ</button>
          <button onclick="subirS3()">Subir S3</button>
          <button onclick="descargarS3()">Descargar S3</button>
          <button class="secondary" onclick="probarSinToken()">Probar 401</button>
          <button class="secondary" onclick="limpiar()">Limpiar</button>
        </div>
        <label>Respuesta</label>
        <pre id="output">Listo para probar.</pre>
      </section>
    </div>
  </main>

  <script>
    const output = document.getElementById('output');
    const statusBox = document.getElementById('status');
    const defaultBackend = location.hostname && location.hostname !== '127.0.0.1'
      ? `${location.protocol}//${location.hostname}:8080`
      : 'http://localhost:8080';

    document.getElementById('baseUrl').value = defaultBackend;

    function value(id) {
      return document.getElementById(id).value.trim();
    }

    function resumenId() {
      return encodeURIComponent(value('numeroResumen'));
    }

    function authHeaders(json) {
      const token = value('token');
      const headers = {};
      if (token) {
        headers.Authorization = `Bearer ${token}`;
      }
      if (json) {
        headers['Content-Type'] = 'application/json';
      }
      return headers;
    }

    function setStatus(code) {
      statusBox.textContent = `HTTP ${code}`;
      statusBox.classList.toggle('error', code >= 400);
    }

    async function call(path, options = {}) {
      const base = value('baseUrl').replace(/\/$/, '');
      const method = options.method || 'GET';
      try {
        const response = await fetch(`${base}${path}`, options);
        const text = await response.text();
        let body = text || '(sin cuerpo)';
        try {
          body = JSON.stringify(JSON.parse(text), null, 2);
        } catch (error) {
          body = text || '(sin cuerpo)';
        }
        setStatus(response.status);
        output.textContent = `${method} ${path}\nHTTP ${response.status}\n\n${body}`;
        output.classList.toggle('error', !response.ok);
      } catch (error) {
        statusBox.textContent = 'Error';
        statusBox.classList.add('error');
        output.classList.add('error');
        output.textContent = `${method} ${path}\n\n${error.message}`;
      }
    }

    function listarCursos() {
      return call('/cursos', { headers: authHeaders(false) });
    }

    function probarSinToken() {
      return call('/cursos');
    }

    function crearCurso() {
      return call('/cursos', {
        method: 'POST',
        headers: authHeaders(true),
        body: JSON.stringify({
          nombre: value('cursoNombre'),
          instructor: value('instructor'),
          duracion: value('duracion'),
          costo: Number(value('costo'))
        })
      });
    }

    function crearInscripcion() {
      return call('/inscripciones', {
        method: 'POST',
        headers: authHeaders(true),
        body: JSON.stringify({
          estudianteNombre: value('estudianteNombre'),
          estudianteEmail: value('estudianteEmail'),
          cursoIds: [Number(value('cursoId'))]
        })
      });
    }

    function generarResumen() {
      return call(`/inscripciones/${resumenId()}/resumen`, { headers: authHeaders(false) });
    }

    function producirRabbit() {
      return call(`/inscripciones/${resumenId()}/resumenes-mq/producir`, {
        method: 'POST',
        headers: authHeaders(false)
      });
    }

    function consumirRabbit() {
      return call('/inscripciones/resumenes-mq/consumir', {
        method: 'POST',
        headers: authHeaders(false)
      });
    }

    function subirS3() {
      return call(`/s3/uploadResumen?numeroResumen=${resumenId()}`, {
        method: 'POST',
        headers: authHeaders(false)
      });
    }

    function descargarS3() {
      return call(`/s3/downloadResumen?numeroResumen=${resumenId()}`, {
        headers: authHeaders(false)
      });
    }

    function limpiar() {
      statusBox.textContent = 'Sin prueba';
      statusBox.classList.remove('error');
      output.classList.remove('error');
      output.textContent = 'Listo para probar.';
    }
  </script>
</body>
</html>
