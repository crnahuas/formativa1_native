name: CI/CD Spring Boot Docker EC2

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: formativa-cloud-native

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Ejecutar pruebas y empaquetar
        run: mvn clean package

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Preparar llave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Desplegar imagen en EC2
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          USER_SERVER: ${{ secrets.USER_SERVER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          ORACLE_DB_URL: ${{ secrets.ORACLE_DB_URL }}
          ORACLE_DB_USERNAME: ${{ secrets.ORACLE_DB_USERNAME }}
          ORACLE_DB_PASSWORD: ${{ secrets.ORACLE_DB_PASSWORD }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key.pem "$USER_SERVER@$EC2_HOST" << EOF
            set -e
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker pull "$DOCKERHUB_USERNAME/$IMAGE_NAME:latest"
            docker stop "$IMAGE_NAME" || true
            docker rm "$IMAGE_NAME" || true
            docker run -d \
              --name "$IMAGE_NAME" \
              --restart unless-stopped \
              -p 8080:8080 \
              -e ORACLE_DB_URL="${ORACLE_DB_URL:-jdbc:oracle:thin:@procesobasedatos_high?TNS_ADMIN=/app/wallet}" \
              -e ORACLE_DB_USERNAME="${ORACLE_DB_USERNAME:-ADMIN}" \
              -e ORACLE_DB_PASSWORD="$ORACLE_DB_PASSWORD" \
              "$DOCKERHUB_USERNAME/$IMAGE_NAME:latest"
            docker ps
          EOF
