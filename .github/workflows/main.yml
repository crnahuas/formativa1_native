name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: my-app
  FRONTEND_IMAGE_NAME: my-app-frontend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # Paso 2: Configurar Java 21 para compilar y ejecutar pruebas
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Paso 3: Compilar y ejecutar pruebas automaticas
      - name: Build and test with Maven
        run: mvn clean package

      # Paso 4: Autenticar en DockerHub
      - name: Log in to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 5: Configurar Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Paso 6: Construir la imagen de Docker
      - name: Build Backend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: false
          tags: ${{ env.FRONTEND_IMAGE_NAME }}:latest

      # Paso 7: Hacer push de las imagenes a DockerHub
      - name: Push Backend Docker Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Push Frontend Docker Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

      # Paso 9: Agregar llave SSH
      - name: Add SSH Key
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Paso 10: Copiar compose a EC2
      - name: Copy Docker Compose and RabbitMQ config to EC2
        if: github.event_name != 'pull_request'
        env:
          USER_SERVER: ${{ secrets.USER_SERVER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$USER_SERVER@$EC2_HOST" "mkdir -p ~/rabbitmq"
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            docker-compose.ec2.yml "$USER_SERVER@$EC2_HOST:~/docker-compose.ec2.yml"
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            rabbitmq/rabbitmq.conf rabbitmq/definitions.json "$USER_SERVER@$EC2_HOST:~/rabbitmq/"

      # Paso 11: Conectarse a EC2 y desplegar app + RabbitMQ
      - name: SSH commands to deploy
        if: github.event_name != 'pull_request'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          FRONTEND_IMAGE_NAME: ${{ env.FRONTEND_IMAGE_NAME }}
          USER_SERVER: ${{ secrets.USER_SERVER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          ORACLE_DB_URL: ${{ secrets.ORACLE_DB_URL }}
          ORACLE_DB_USERNAME: ${{ secrets.ORACLE_DB_USERNAME }}
          ORACLE_DB_PASSWORD: ${{ secrets.ORACLE_DB_PASSWORD }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AZURE_B2C_ISSUER_URI: ${{ secrets.AZURE_B2C_ISSUER_URI }}
          APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS || '*' }}
          APP_SECURITY_ROLES_ENABLED: ${{ secrets.APP_SECURITY_ROLES_ENABLED || 'false' }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME || 'guest' }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD || 'guest' }}
          RABBITMQ_RESUMEN_QUEUE: ${{ secrets.RABBITMQ_RESUMEN_QUEUE || 'resumen.inscripcion.queue' }}
          RABBITMQ_RESUMEN_EXCHANGE: ${{ secrets.RABBITMQ_RESUMEN_EXCHANGE || 'resumen.inscripcion.exchange' }}
          RABBITMQ_RESUMEN_ROUTING_KEY: ${{ secrets.RABBITMQ_RESUMEN_ROUTING_KEY || 'resumen.inscripcion.key' }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$USER_SERVER@$EC2_HOST" << EOF
            set -e
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            CONTAINERS_ON_8080=\$(docker ps -q --filter "publish=8080")
            if [ -n "\$CONTAINERS_ON_8080" ]; then
              docker stop \$CONTAINERS_ON_8080
            fi
            CONTAINERS_ON_3000=\$(docker ps -q --filter "publish=3000")
            if [ -n "\$CONTAINERS_ON_3000" ]; then
              docker stop \$CONTAINERS_ON_3000
            fi

            docker stop "$IMAGE_NAME" || true
            docker rm "$IMAGE_NAME" || true
            docker rm formativa-cloud-native || true
            docker stop "$FRONTEND_IMAGE_NAME" || true
            docker rm "$FRONTEND_IMAGE_NAME" || true
            docker rm formativa-frontend || true
            docker stop formativa-rabbitmq || true
            docker rm formativa-rabbitmq || true

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              sudo dnf install -y docker-compose-plugin || sudo yum install -y docker-compose-plugin
              COMPOSE="docker compose"
            fi

            ENV_FILE="\$HOME/formativa-cloud-native.env"
            printf '%s\n' \
              "DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME" \
              "FRONTEND_IMAGE_NAME=$FRONTEND_IMAGE_NAME" \
              "ORACLE_DB_URL=${ORACLE_DB_URL:-jdbc:oracle:thin:@procesobasedatos_high?TNS_ADMIN=/app/wallet}" \
              "ORACLE_DB_USERNAME=${ORACLE_DB_USERNAME:-ADMIN}" \
              "ORACLE_DB_PASSWORD=$ORACLE_DB_PASSWORD" \
              "AWS_REGION=$AWS_REGION" \
              "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" \
              "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" \
              "AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN" \
              "AWS_S3_BUCKET_NAME=$AWS_S3_BUCKET_NAME" \
              "AZURE_B2C_ISSUER_URI=$AZURE_B2C_ISSUER_URI" \
              "APP_CORS_ALLOWED_ORIGINS=$APP_CORS_ALLOWED_ORIGINS" \
              "APP_SECURITY_ROLES_ENABLED=$APP_SECURITY_ROLES_ENABLED" \
              "RABBITMQ_USERNAME=$RABBITMQ_USERNAME" \
              "RABBITMQ_PASSWORD=$RABBITMQ_PASSWORD" \
              "RABBITMQ_RESUMEN_QUEUE=$RABBITMQ_RESUMEN_QUEUE" \
              "RABBITMQ_RESUMEN_EXCHANGE=$RABBITMQ_RESUMEN_EXCHANGE" \
              "RABBITMQ_RESUMEN_ROUTING_KEY=$RABBITMQ_RESUMEN_ROUTING_KEY" \
              > "\$ENV_FILE"

            \$COMPOSE -f "\$HOME/docker-compose.ec2.yml" --env-file "\$ENV_FILE" pull
            \$COMPOSE -f "\$HOME/docker-compose.ec2.yml" --env-file "\$ENV_FILE" up -d
            \$COMPOSE -f "\$HOME/docker-compose.ec2.yml" --env-file "\$ENV_FILE" ps
          EOF
