name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: my-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # Paso 2: Configurar Java 21 para compilar y ejecutar pruebas
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Paso 3: Compilar y ejecutar pruebas automaticas
      - name: Build and test with Maven
        run: mvn clean package

      # Paso 4: Autenticar en DockerHub
      - name: Log in to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 5: Configurar Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Paso 6: Construir la imagen de Docker
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest

      # Paso 7: Hacer push de la imagen a DockerHub
      - name: Push Docker Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # Paso 8: Configurar credenciales de AWS, incluyendo AWS_SESSION_TOKEN
      - name: Set up AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # Paso 9: Agregar llave SSH
      - name: Add SSH Key
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Paso 10: Conectarse a EC2 y desplegar el contenedor
      - name: SSH commands to deploy
        if: github.event_name != 'pull_request'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          USER_SERVER: ${{ secrets.USER_SERVER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          ORACLE_DB_URL: ${{ secrets.ORACLE_DB_URL }}
          ORACLE_DB_USERNAME: ${{ secrets.ORACLE_DB_USERNAME }}
          ORACLE_DB_PASSWORD: ${{ secrets.ORACLE_DB_PASSWORD }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AZURE_B2C_ISSUER_URI: ${{ secrets.AZURE_B2C_ISSUER_URI }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$USER_SERVER@$EC2_HOST" << EOF
            set -e
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker pull "$DOCKERHUB_USERNAME/$IMAGE_NAME:latest"

            CONTAINERS_ON_8080=$(docker ps -q --filter "publish=8080")
            if [ -n "$CONTAINERS_ON_8080" ]; then
              docker stop $CONTAINERS_ON_8080
            fi

            docker stop "$IMAGE_NAME" || true
            docker rm "$IMAGE_NAME" || true
            docker rm formativa-cloud-native || true

            printf '%s\n' \
              'spring:' \
              '  datasource:' \
              "    url: \"${ORACLE_DB_URL:-jdbc:oracle:thin:@procesobasedatos_high?TNS_ADMIN=/app/wallet}\"" \
              "    username: \"${ORACLE_DB_USERNAME:-ADMIN}\"" \
              "    password: \"$ORACLE_DB_PASSWORD\"" \
              '  security:' \
              '    oauth2:' \
              '      resourceserver:' \
              '        jwt:' \
              "          issuer-uri: \"$AZURE_B2C_ISSUER_URI\"" \
              'aws:' \
              "  region: \"$AWS_REGION\"" \
              "  access-key: \"$AWS_ACCESS_KEY_ID\"" \
              "  secret-key: \"$AWS_SECRET_ACCESS_KEY\"" \
              "  session-token: \"$AWS_SESSION_TOKEN\"" \
              '  s3:' \
              "    bucket-name: \"$AWS_S3_BUCKET_NAME\"" \
              > /tmp/formativa-cloud-native-application.yml

            docker run -d \
              --name "$IMAGE_NAME" \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /tmp/formativa-cloud-native-application.yml:/app/application.yml:ro \
              -e ORACLE_DB_URL="${ORACLE_DB_URL:-jdbc:oracle:thin:@procesobasedatos_high?TNS_ADMIN=/app/wallet}" \
              -e ORACLE_DB_USERNAME="${ORACLE_DB_USERNAME:-ADMIN}" \
              -e ORACLE_DB_PASSWORD="$ORACLE_DB_PASSWORD" \
              -e AWS_REGION="$AWS_REGION" \
              -e AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
              -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
              -e AWS_SESSION_TOKEN="$AWS_SESSION_TOKEN" \
              -e AWS_S3_BUCKET_NAME="$AWS_S3_BUCKET_NAME" \
              -e AZURE_B2C_ISSUER_URI="$AZURE_B2C_ISSUER_URI" \
              "$DOCKERHUB_USERNAME/$IMAGE_NAME:latest"
            docker ps
          EOF
