services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: formativa-rabbitmq
    restart: unless-stopped
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${DOCKERHUB_USERNAME}/my-app:latest
    container_name: formativa-cloud-native
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ORACLE_DB_URL: ${ORACLE_DB_URL}
      ORACLE_DB_USERNAME: ${ORACLE_DB_USERNAME:-ADMIN}
      ORACLE_DB_PASSWORD: ${ORACLE_DB_PASSWORD}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AZURE_B2C_ISSUER_URI: ${AZURE_B2C_ISSUER_URI}
      APP_CORS_ALLOWED_ORIGINS: "${APP_CORS_ALLOWED_ORIGINS:-*}"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_RESUMEN_QUEUE: ${RABBITMQ_RESUMEN_QUEUE:-resumen.inscripcion.queue}
      RABBITMQ_RESUMEN_EXCHANGE: ${RABBITMQ_RESUMEN_EXCHANGE:-resumen.inscripcion.exchange}
      RABBITMQ_RESUMEN_ROUTING_KEY: ${RABBITMQ_RESUMEN_ROUTING_KEY:-resumen.inscripcion.key}

  frontend:
    image: ${DOCKERHUB_USERNAME}/${FRONTEND_IMAGE_NAME:-my-app-frontend}:latest
    container_name: formativa-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "3000:80"
